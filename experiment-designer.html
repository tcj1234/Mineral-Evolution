<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>实验方案生成器</title><style>body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;background:linear-gradient(180deg,#0f172a,#111827);color:#f8fafc}main,header{max-width:1100px;margin:auto;padding:18px}.card{background:rgba(255,255,255,.09);border:1px solid rgba(255,255,255,.16);border-radius:22px;padding:18px;margin:14px 0}a{color:#7dd3fc;text-decoration:none}.btn{display:inline-block;padding:10px 12px;border-radius:999px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.16);margin:5px}.muted{color:#cbd5e1;line-height:1.7}select,textarea{width:100%;border:1px solid rgba(255,255,255,.16);border-radius:14px;background:rgba(15,23,42,.72);color:#f8fafc;padding:11px;font-size:15px}textarea{min-height:420px;line-height:1.7}button{width:100%;border:0;border-radius:16px;padding:13px 15px;margin-top:12px;font-weight:850;background:linear-gradient(135deg,#38bdf8,#22c55e);color:#062033}</style></head><body><header><h1>实验方案生成器</h1><p class="muted">选择研究目标，自动生成变量设计、对照组、表征方案、性能测试和论文图表安排。</p><a class="btn" href="index.html">返回首页</a><a class="btn" href="figure-planner.html">图表规划器</a></header><main><section class="card"><h2>选择研究目标</h2><select id="topic"><option value="phenol">不同结晶度水钠锰矿氧化聚合苯酚</option><option value="phase">α/β/γ/δ-MnO₂ 晶相构效关系</option><option value="transform">低结晶度水钠锰矿向其他锰氧化物转化</option><option value="antibiotic">粘土负载 MnO₂ 去除抗生素</option><option value="voc">MnO₂ 催化氧化 VOCs</option></select><button onclick="make()">生成方案</button><textarea id="out"></textarea></section></main><script>function make(){let v=topic.value;let text={phenol:`题目：不同结晶度水钠锰矿介导苯酚氧化聚合机制\n\n1. 实验目的\n比较 L-Bir 与 H-Bir 在酸性条件下对苯酚转化、聚合产物形成、Mn氧化还原和 ROS 贡献的差异。\n\n2. 变量设计\n材料：L-Bir、H-Bir。条件：pH 2±0.1，PhOH 0.1 mM 或 250 mg/L，Cat. 0.2–0.5 g/L。\n\n3. 对照组\n无催化剂、无苯酚、酸空白、热灭活/煅烧样品、不同 pH。\n\n4. 机制实验\nFA/ACN/pBQ/FFA/TBA 淬灭，EPR 检测 O2•−、1O2、•OH，HONH3Cl 溶解释放验证吸附/反应。\n\n5. 表征\nXRD、Raman、BET、SEM/TEM、XPS Mn 2p/3s、O 1s/C 1s、ATR-FTIR、TG、LC-MS、电化学 CV/i-t/OCPT。\n\n6. 预期结论\nL-Bir 初始速率更快但易钝化；H-Bir 反应更持续。主路径为 Mn(IV/III)介导电子转移和苯氧自由基 C–C/C–O 偶联，ROS 参与部分降解。`,phase:`题目：不同晶相 MnO2 的污染物转化构效关系\n\n材料：α、β、γ、δ-MnO2。\n变量：晶相、比表面积、Mn价态、氧空位、低温还原性。\n表征：XRD、Raman、SEM/TEM、BET、XPS、H2-TPR、O2-TPD。\n性能：苯酚/甲醛/甲苯/抗生素转化。\n关键假设：δ-MnO2 活性位点多；α-MnO2 隧道结构稳定；β-MnO2 稳定但反应性较弱；γ-MnO2 缺陷丰富。`,transform:`题目：低结晶度水钠锰矿在表生环境中的转化及反应性演化\n\n变量：pH、温度、K+/Na+/Ca2+/Mn2+、Cl−/NO3−/SO42−、有机酸、时间。\n产物：H-Bir、MnOOH、todorokite、α-MnO2、Mn3O4、无定形 MnOx。\n表征：时间序列 XRD/Raman/TEM/XPS/ICP。\n性能：转化过程中对苯酚或抗生素的去除性能变化。\n核心问题：结构有序化是否降低初始反应性但提高稳定性。`,antibiotic:`题目：粘土矿物负载 MnO2 去除抗生素\n\n载体：蒙脱石、高岭石、埃洛石、沸石。\n污染物：四环素、诺氟沙星、磺胺类。\n对照：载体、MnO2、复合材料、物理混合。\n机制：吸附、络合、表面电子转移、氧化降解。\n风险：Mn 溶出、载体竞争吸附、降解产物毒性。`,voc:`题目：MnO2 晶相调控 VOCs 催化氧化\n\n材料：α/β/γ/δ-MnO2。\n污染物：甲醛、甲苯。\n表征：H2-TPR、O2-TPD、XPS O 1s、Raman、原位 DRIFTS。\n指标：T50/T90、稳定性、水汽抗性、CO2选择性。\n机制：吸附活化、C-H 活化、晶格氧迁移、氧空位循环。`}[v];out.value=text}make()</script></body></html>
