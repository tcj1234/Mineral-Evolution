<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>论文写作助手</title><style>body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;background:linear-gradient(180deg,#0f172a,#111827);color:#f8fafc}main,header{max-width:1100px;margin:auto;padding:18px}.card{background:rgba(255,255,255,.09);border:1px solid rgba(255,255,255,.16);border-radius:22px;padding:18px;margin:14px 0}a{color:#7dd3fc;text-decoration:none}.btn{display:inline-block;padding:10px 12px;border-radius:999px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.16);margin:5px}.muted{color:#cbd5e1;line-height:1.7}select,textarea,input{width:100%;border:1px solid rgba(255,255,255,.16);border-radius:14px;background:rgba(15,23,42,.72);color:#f8fafc;padding:11px;font-size:15px}textarea{min-height:420px;line-height:1.7}button{width:100%;border:0;border-radius:16px;padding:13px 15px;margin-top:12px;font-weight:850;background:linear-gradient(135deg,#38bdf8,#22c55e);color:#062033}</style></head><body><header><h1>论文写作助手</h1><p class="muted">按摘要、引言、结果讨论、机制和结论生成可修改的论文段落骨架。</p><a class="btn" href="index.html">返回首页</a><a class="btn" href="analysis-templates.html">表征写作模板</a></header><main><section class="card"><h2>生成论文模块</h2><label>主题</label><select id="topic"><option value="phenol">不同结晶度水钠锰矿氧化聚合苯酚</option><option value="phase">不同晶相 MnO₂ 污染物转化</option><option value="transform">水钠锰矿转化及反应性演化</option></select><label>章节</label><select id="section"><option value="abstract">摘要</option><option value="intro">引言逻辑</option><option value="results">结果与讨论框架</option><option value="mechanism">机制段落</option><option value="conclusion">结论</option></select><button onclick="gen()">生成草稿</button><textarea id="out"></textarea></section></main><script>function gen(){let t=topic.value,s=section.value;let p={phenol:{abstract:'本研究比较了低结晶度与高结晶度水钠锰矿在酸性条件下介导苯酚转化的反应行为。结果表明，低结晶度样品由于缺陷丰富和电子转移能力较强，表现出更快的初始转化速率；高结晶度样品则具有更稳定的持续反应特征。ATR-FTIR、XPS 和 LC-MS 共同证明苯酚主要通过苯氧自由基 C–C/C–O 偶联形成二聚体、寡聚体和表面聚合物。EPR 和淬灭实验表明 O2•− 与 1O2 参与部分降解路径，但直接表面电子转移仍是初始氧化的核心过程。',intro:'引言可按以下逻辑展开：1）苯酚类污染物来源广泛且具有环境风险；2）锰氧化物是表生环境中重要的天然氧化剂；3）水钠锰矿因层状结构、Mn(III/IV)变价和缺陷位点而具有强氧化能力；4）不同结晶度如何调控苯酚聚合与降解仍不清楚；5）本研究通过结构表征、动力学、产物识别和电化学证据建立结构-反应性关系。',results:'结果与讨论建议结构：3.1 材料结构和表面性质；3.2 苯酚转化动力学；3.3 pH/投加量/浓度影响；3.4 抑制剂和 ROS 贡献；3.5 表面聚合物证据；3.6 LC-MS产物识别；3.7 Mn氧化还原和电子转移；3.8 机制图。',mechanism:'在酸性条件下，苯酚首先在带正电或富含活性位点的水钠锰矿表面富集，随后通过 Mn(IV/III) 介导的界面电子转移形成苯氧自由基。苯氧自由基进一步发生 C–C 或 C–O 偶联，生成二聚体、寡聚体和表面聚合物。与此同时，Mn(IV/III)被还原并伴随少量 Mn(II)释放，O2•− 和 1O2 参与副反应或深度氧化路径。',conclusion:'本研究表明，水钠锰矿结晶度显著影响苯酚氧化聚合过程。低结晶度样品具有更高初始活性，但更易因聚合物覆盖而钝化；高结晶度样品反应更温和但稳定性更好。该结果强调了天然锰氧化物结构演化对酚类污染物环境归趋的重要影响。'},phase:{abstract:'本研究比较不同晶相 MnO2 的污染物转化性能，揭示晶体结构、缺陷、氧空位和 Mn价态对反应性的调控作用。',intro:'引言强调 MnO2 多晶型、结构差异、氧化还原能力和环境催化意义。',results:'结果框架：晶相表征、形貌和比表面积、价态和氧空位、污染物去除、构效关系。',mechanism:'不同晶相通过调控表面 Mn 位点、晶格氧迁移和吸附构型影响污染物活化。',conclusion:'晶相工程可作为优化 MnO2 环境催化性能的重要策略。'},transform:{abstract:'本研究关注低结晶度水钠锰矿在表生环境条件下的转化及其反应性演化。',intro:'引言强调表生环境中 Mn氧化物动态转化及其污染物反应性变化。',results:'结果框架：转化产物、动力学、离子效应、有机酸效应、反应性演化。',mechanism:'结构有序化、层间离子稳定和价态重分配共同控制转化过程。',conclusion:'水钠锰矿转化不仅改变矿物结构，也重塑其污染物氧化能力。'}}[t][s];out.value=p}gen()</script></body></html>
