<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>数据拟合与图表模块</title><style>body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;background:linear-gradient(180deg,#0f172a,#111827);color:#f8fafc}main,header{max-width:1100px;margin:auto;padding:18px}.card{background:rgba(255,255,255,.09);border:1px solid rgba(255,255,255,.16);border-radius:22px;padding:18px;margin:14px 0}.grid{display:grid;gap:14px}@media(min-width:850px){.grid{grid-template-columns:1fr 1fr}}a{color:#7dd3fc;text-decoration:none}.btn{display:inline-block;padding:10px 12px;border-radius:999px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.16);margin:5px}.muted{color:#cbd5e1;line-height:1.7}textarea,input{width:100%;border:1px solid rgba(255,255,255,.16);border-radius:14px;background:rgba(15,23,42,.72);color:#f8fafc;padding:11px;font-size:15px}textarea{min-height:190px}button{width:100%;border:0;border-radius:16px;padding:13px 15px;margin-top:12px;font-weight:850;background:linear-gradient(135deg,#38bdf8,#22c55e);color:#062033}.box{background:rgba(15,23,42,.62);border:1px dashed rgba(255,255,255,.16);border-radius:16px;padding:12px;line-height:1.75;color:#e0f2fe}table{width:100%;border-collapse:collapse}td,th{border-bottom:1px solid rgba(255,255,255,.16);padding:8px;text-align:left}.danger{color:#fecdd3}</style></head><body><header><h1>数据拟合与图表模块</h1><p class="muted">输入时间-浓度数据，自动计算拟一级动力学 kobs、R²、半衰期，并生成可复制的结果解释。</p><a class="btn" href="index.html">返回首页</a><a class="btn" href="phenol-birnessite.html">苯酚专题</a></header><main><section class="card"><h2>一级动力学拟合</h2><div class="grid"><div><p class="muted">格式：每行一组数据，使用“时间, C/C0”。例如：0,1</p><textarea id="data">0,1
5,0.82
10,0.70
20,0.55
30,0.45
60,0.28</textarea><button onclick="fit()">计算 kobs 和 R²</button></div><div><div id="result" class="box"></div><div id="table"></div></div></div></section><section class="card"><h2>淬灭实验解释</h2><p class="muted">输入各条件转化率，快速判断抑制强弱。格式：条件,转化率。</p><textarea id="quench">Blank,100
FA,45
ACN,70
pBQ,80
FFA,65
TBA,92</textarea><button onclick="runQuench()">生成淬灭解释</button><div id="qout" class="box"></div></section></main><script>const INNER_HTML_RISK_AUDIT=[{priority:"P0",target:"runQuench()",source:"用户输入条件名称"},{priority:"P1",target:"fit()结果模板",source:"数值型输入"}];function esc(s){return String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]))}function err(el,msg){el.classList.add('danger');el.textContent=msg}function ok(el,html){el.classList.remove('danger');el.innerHTML=html}function parseRows(t){return t.trim().split(/\n+/).map(x=>x.split(/[,，\s]+/)).map(a=>[+a[0],+a[1]]).filter(a=>Number.isFinite(a[0])&&Number.isFinite(a[1])&&a[0]>=0&&a[1]>0)}function fit(){let d=parseRows(data.value);if(d.length<3){err(result,'数据点至少需要 3 行，且 C/C0 > 0。');table.textContent='';return}let pts=d.filter(x=>x[0]>0&&x[1]<=1).map(x=>[x[0],Math.log(1/x[1])]);if(pts.length<2){err(result,'请提供至少 2 个 t>0 且 0<C/C0≤1 的数据点。');table.textContent='';return}let n=pts.length,sx=0,sy=0,sxx=0,sxy=0;pts.forEach(p=>{sx+=p[0];sy+=p[1];sxx+=p[0]*p[0];sxy+=p[0]*p[1]});let den=n*sxx-sx*sx;if(!Number.isFinite(den)||Math.abs(den)<1e-12){err(result,'时间数据缺乏变化，无法拟合直线。');table.textContent='';return}let k=(n*sxy-sx*sy)/den,b=(sy-k*sx)/n,ym=sy/n,ssr=0,sst=0;pts.forEach(p=>{let y=k*p[0]+b;ssr+=(p[1]-y)**2;sst+=(p[1]-ym)**2});let r2=sst===0?1:1-ssr/sst,t12=k>0?Math.log(2)/k:NaN;if(!Number.isFinite(k)||!Number.isFinite(r2)){err(result,'拟合失败，请检查输入数据。');table.textContent='';return}ok(result,`kobs = <b>${k.toFixed(5)} min⁻¹</b><br>R² = <b>${r2.toFixed(4)}</b><br>t1/2 = <b>${Number.isFinite(t12)?t12.toFixed(2):'--'} min</b><br>拟合方程：ln(C₀/Ct) = ${k.toFixed(5)}t + ${b.toFixed(4)}<br><br>写作模板：The pseudo-first-order fitting gave a kobs of ${k.toFixed(5)} min⁻¹ with R²=${r2.toFixed(4)}, indicating that the apparent transformation of phenol followed pseudo-first-order kinetics under the tested conditions.`);let tbl=document.createElement('table');let hr=document.createElement('tr');['t','C/C0','ln(C0/Ct)'].forEach(h=>{let th=document.createElement('th');th.textContent=h;hr.appendChild(th)});tbl.appendChild(hr);d.forEach(x=>{let tr=document.createElement('tr');[x[0],x[1],Math.log(1/x[1]).toFixed(4)].forEach(v=>{let td=document.createElement('td');td.textContent=String(v);tr.appendChild(td)});tbl.appendChild(tr)});table.textContent='';table.appendChild(tbl)}function runQuench(){let d=quench.value.trim().split(/\n+/).map(x=>x.split(/[,，\s]+/)).map(a=>[String(a[0]||'').trim(),+a[1]]).filter(x=>x[0]&&Number.isFinite(x[1]));if(d.length<2){err(qout,'请至少输入两组“条件,转化率”数据。');return}let blank=(d.find(x=>/blank|空白/i.test(x[0]))||d[0])[1];if(!Number.isFinite(blank)){err(qout,'缺少有效的 Blank/空白 转化率。');return}let arr=d.filter(x=>x[1]!==blank).map(x=>[x[0],Math.max(0,blank-x[1])]).sort((a,b)=>b[1]-a[1]);if(!arr.length){err(qout,'未检测到可比较的抑制剂数据。');return}ok(qout,'抑制强弱排序：<br>'+arr.map(x=>`${esc(x[0])}：降低 ${x[1].toFixed(1)}%`).join('<br>')+'<br><br>解释：FA 抑制强通常指向活性位点/电子转移竞争；pBQ 指示 O₂•⁻；FFA 指示 ¹O₂；TBA 主要考察 •OH。')}fit();runQuench()</script></body></html>
