<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>科研图表规划器</title><style>body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;background:linear-gradient(180deg,#0f172a,#111827);color:#f8fafc}main,header{max-width:1100px;margin:auto;padding:18px}.card{background:rgba(255,255,255,.09);border:1px solid rgba(255,255,255,.16);border-radius:22px;padding:18px;margin:14px 0}a{color:#7dd3fc;text-decoration:none}.btn{display:inline-block;padding:10px 12px;border-radius:999px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.16);margin:5px}.muted{color:#cbd5e1;line-height:1.7}select{width:100%;border:1px solid rgba(255,255,255,.16);border-radius:14px;background:rgba(15,23,42,.72);color:#f8fafc;padding:11px;font-size:15px}button{width:100%;border:0;border-radius:16px;padding:13px 15px;margin-top:12px;font-weight:850;background:linear-gradient(135deg,#38bdf8,#22c55e);color:#062033}table{width:100%;border-collapse:collapse;margin-top:14px}td,th{border-bottom:1px solid rgba(255,255,255,.16);padding:10px;text-align:left;vertical-align:top}th{color:#e0f2fe;background:rgba(56,189,248,.12)}</style></head><body><header><h1>科研图表规划器</h1><p class="muted">根据研究主题自动规划论文 Figure 1–8 的内容、目的和对应表征。</p><a class="btn" href="index.html">返回首页</a><a class="btn" href="paper-writer.html">论文写作助手</a></header><main><section class="card"><h2>选择主题</h2><select id="topic"><option value="phenol">不同结晶度水钠锰矿氧化聚合苯酚</option><option value="phase">不同晶相 MnO₂ 构效关系</option><option value="transform">水钠锰矿转化与反应性演化</option></select><button onclick="plan()">生成图表方案</button><div id="out"></div></section></main><script>function plan(){let data={phenol:[['Fig.1','XRD/Raman/BET/XPS/SEM','证明 L-Bir 与 H-Bir 结构、价态和形貌差异'],['Fig.2','PhOH 去除动力学、kobs','比较初始活性与长期去除'],['Fig.3','pH、投加量、浓度影响','确定反应控制因素'],['Fig.4','FA/ACN/pBQ/FFA/TBA + EPR','区分电子转移、ROS和竞争抑制'],['Fig.5','ATR-FTIR/XPS/TG','证明表面聚合物和官能团变化'],['Fig.6','LC-MS/MS','识别二聚体、寡聚体和氧化产物'],['Fig.7','Mn(II)释放、AOS、电化学','证明 Mn氧化还原和电子转移'],['Fig.8','机制图','总结吸附-电子转移-自由基偶联-ROS副路径']],phase:[['Fig.1','XRD/Raman/SEM','确认 α/β/γ/δ-MnO₂ 晶相和形貌'],['Fig.2','BET/XPS/O 1s','比较比表面积、价态和氧空位'],['Fig.3','H2-TPR/O2-TPD','评价还原性和氧迁移能力'],['Fig.4','污染物去除性能','建立活性序列'],['Fig.5','反应条件影响','考察 pH/温度/水汽/离子效应'],['Fig.6','原位谱或产物分析','识别反应中间体'],['Fig.7','稳定性循环','评价应用潜力'],['Fig.8','构效关系图','总结晶相-缺陷-活性关系']],transform:[['Fig.1','时间序列 XRD/Raman','追踪 birnessite 转化产物'],['Fig.2','TEM/SEM','观察形貌从片层到针/棒/隧道结构变化'],['Fig.3','XPS/ICP','分析 Mn价态和溶出'],['Fig.4','pH/温度/离子效应','确定环境驱动因子'],['Fig.5','有机酸影响','解释络合和抑制晶化'],['Fig.6','污染物去除随转化变化','连接结构演化与反应性'],['Fig.7','动力学模型','描述矿物转化速率'],['Fig.8','转化路径图','总结表生环境矿物演化网络']]};let rows=data[topic.value].map(r=>`<tr><td>${r[0]}</td><td>${r[1]}</td><td>${r[2]}</td></tr>`).join('');out.innerHTML=`<table><tr><th>图号</th><th>内容</th><th>目的</th></tr>${rows}</table>`}plan()</script></body></html>
